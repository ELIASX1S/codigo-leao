<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Código do Leão</title>
  <style>
    :root {
      --bg: #0f0f12;
      --card: #1a1b22;
      --text: #f3f4f6;
      --muted: #b8bfd1;
      --gold: #d4af37;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #21242d, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(920px, 100%);
      background: var(--card);
      border: 1px solid #2e3341;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .media {
      min-height: 360px;
      background: #111;
    }

    .media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .content {
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      justify-content: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 2.8vw, 2.4rem);
      color: var(--gold);
    }

    p {
      margin: 0;
      line-height: 1.6;
      color: var(--muted);
    }

    .btn {
      margin-top: 8px;
      width: fit-content;
      text-decoration: none;
      background: var(--gold);
      color: #111;
      font-weight: 700;
      padding: 12px 18px;
      border-radius: 10px;
    }

    @media (max-width: 760px) {
      .card { grid-template-columns: 1fr; }
      .content { padding: 24px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="media">
      <img src="capa.png" alt="Capa do Código do Leão" />
    </div>

    <section class="content">
      <h1>Código do Leão</h1>
      <p>
        Página em HTML criada com estrutura simples, visual limpo e responsivo.
        Você pode usar este modelo como base para incluir mais seções, botões,
        depoimentos e informações de venda.
      </p>
      <a class="btn" href="#">Quero saber mais</a>
    </section>
  </main>
</body>
</html>
